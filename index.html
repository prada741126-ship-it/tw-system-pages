<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>台灣版整合系統</title>
<link rel="stylesheet" href="app.css?v=1784920971278">
</head>
<body>

<!-- 登入畫面 -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-icon">♠</div>
    <h1>授 權 驗 證</h1>
    <div class="login-sub">博盈國際會 · 台灣版整合管理</div>
    <input type="password" id="login-pwd" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')handleLogin()">
    <button onclick="handleLogin()">進 入 系 統</button>
  </div>
</div>

<!-- 主應用 -->
<div id="app" style="display:none;">
  <!-- 側邊欄 -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">♠</div>
      <div class="brand-title">博盈國際會</div>
      <div class="brand-sub">台灣版 v1.0</div>
    </div>
    <ul class="nav-list" id="nav-list"></ul>
  </div>

  <!-- 主內容區 -->
  <div class="main-content">
    <div class="topbar">
      <h2 id="topbar-title">總覽</h2>
      <div id="sync-status"></div>
    </div>
    <div id="page-overview" class="page-section active"></div>
    <div id="page-pending" class="page-section"></div>
    <div id="page-member" class="page-section"></div>
    <div id="page-room" class="page-section"></div>
    <div id="page-fees" class="page-section"></div>
    <div id="page-profit" class="page-section"></div>
    <div id="page-agent" class="page-section"></div>
    <div id="page-shareholder" class="page-section"></div>
    <div id="page-members-mgmt" class="page-section"></div>
    <div id="page-history" class="page-section"></div>
    <div id="page-settings" class="page-section"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="Modal.close()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast-container" class="toast-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
<script src="app.js?v=1784920971278"></script>
</body>
</html>
